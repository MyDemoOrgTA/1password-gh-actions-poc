name: Test 1Password

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        with:
          export-env: true

      - name: Verify secret injection (safe)
        run: |
          if [ -z "$DB_PASSWORD" ]; then
            echo "❌ Secret not loaded"
            exit 1
          else
            echo "✅ Secret length: ${#DB_PASSWORD}"
          fi
        env:
          DB_PASSWORD: op://Test/DB_PASS/password

      - name: Debug secret (controlled)
        run: |
          echo "::add-mask::$DB_PASSWORD"
          echo "Length: ${#DB_PASSWORD}"
          echo "First char: ${DB_PASSWORD:0:1}"
          echo "Last char: ${DB_PASSWORD: -1}"
        env:
          DB_PASSWORD: op://Test/DB_PASS/password
