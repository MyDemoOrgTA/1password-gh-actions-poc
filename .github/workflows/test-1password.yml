name: Test 1Password Debug

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Authenticate & load 1Password
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        with:
          export-env: true

      # Step 2 — Validate secret injection (safe)
      - name: Verify secret injection (safe)
        run: |
          if [ -z "$DB_PASSWORD" ]; then
            echo "❌ Secret not loaded"
            exit 1
          else
            echo "✅ Secret length: ${#DB_PASSWORD}"
          fi
        env:
          DB_PASSWORD: op://Test/DB_PASS/password

      # Step 3 — Debug secret (controlled, masked)
      - name: Debug secret (controlled)
        run: |
          echo "::add-mask::$DB_PASSWORD"
          echo "Length: ${#DB_PASSWORD}"
          echo "First char: ${DB_PASSWORD:0:1}"
          echo "Last char: ${DB_PASSWORD: -1}"
        env:
          DB_PASSWORD: op://Test/DB_PASS/password

      # Step 4 — Force fresh read (bypass caching)
      - name: Debug fresh read (force latest)
        run: |
          VALUE=$(op read "op://Test/DB_PASS/password?refresh=true")
          echo "::add-mask::$VALUE"
          echo "Fresh Length: ${#VALUE}"
          echo "Fresh First char: ${VALUE:0:1}"
          echo "Fresh Last char: ${VALUE: -1}"

      # Step 5 — Confirm correct item (no secret exposure)
      - name: Confirm item metadata
        run: |
          echo "Item ID:"
          op item get "DB_PASS" --vault Test --format=json | jq -r '.id'

          echo "Field labels:"
          op item get "DB_PASS" --vault Test --format=json | jq -r '.fields[].label'
