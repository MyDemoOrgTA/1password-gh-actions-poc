name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Authenticate & load all secrets from 1Password
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@7ce42673ba9ed69053d678faeba29ea36bd25755  # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DB_USERNAME: op://Test/DB_PASS/username
          DB_PASSWORD: op://Test/DB_PASS/password
        with:
          export-env: true

      # Validate secrets loaded (no values exposed)
      - name: Validate secrets
        run: |
          [ -n "$DB_USERNAME" ] && echo "DB_USERNAME set" || { echo "DB_USERNAME missing"; exit 1; }
          [ -n "$DB_PASSWORD" ] && echo "DB_PASSWORD set" || { echo "DB_PASSWORD missing"; exit 1; }

      - name: Debug (length only)
        run: |
          echo "DB_USERNAME length: ${#DB_USERNAME}"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"
