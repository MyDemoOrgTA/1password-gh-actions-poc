name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      # 🔐 Authenticate & load all secrets from 1Password
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@581a835fa7cf9e223e03a8bea4197580f97f37e4  # v2.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DB_USERNAME: op://Test/DB_PASS/username
          DB_PASSWORD: op://Test/DB_PASS/password
        with:
          export-env: true

      # ✅ Validate secrets loaded (no values exposed)
      - name: Validate secrets
        run: |
          [ -n "$DB_USERNAME" ] && echo "✅ DB_USERNAME set" || { echo "❌ DB_USERNAME missing"; exit 1; }
          [ -n "$DB_PASSWORD" ] && echo "✅ DB_PASSWORD set" || { echo "❌ DB_PASSWORD missing"; exit 1; }

      # 🚀 Your deployment step — secrets available as real env vars
      - name: Deploy
        run: ./scripts/deploy.sh
