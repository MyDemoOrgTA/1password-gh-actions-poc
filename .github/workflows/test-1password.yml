name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    # 🔐 Centralized secret mapping (best practice)
    env:
      DB_USERNAME: op://Test/DB_PASS/username
      DB_PASSWORD: op://Test/DB_PASS/password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔐 Authenticate & load all secrets from 1Password
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        with:
          export-env: true

      # ✅ Optional validation (safe — no secret exposure)
      - name: Validate secrets (non-sensitive)
        run: |
          if [ -z "$DB_USERNAME" ] || [ -z "$DB_PASSWORD" ]; then
            echo "❌ Required secrets are missing"
            exit 1
          fi
          echo "✅ Secrets loaded successfully"

      # ✅ All secrets available as real env vars from here onwards 
      - name: Verify (lengths only — values are masked) 
        run: | 
          echo "DB_USERNAME length: ${#DB_USERNAME}"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"

      # 🚀 Your actual deployment step
